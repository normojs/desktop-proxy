name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    name: build-test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Cross-platform guard: the installer's path/layout/platform logic and the
        # runtime/relay must build + pass tests on all three desktop OSes.
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          # Electron is a types-only dev dependency; skip the binary download.
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test
